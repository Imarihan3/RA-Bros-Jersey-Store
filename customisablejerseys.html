<!DOCTYPE html>
<html>
<head>
<title>Custom Jersey</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; text-align:center; }

.container {
  padding:40px;
}

input {
  padding:10px;
  margin:10px;
  width:200px;
}

button {
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎨 Custom Jersey</h1>
<button onclick="location.href='cart.html'">🛒 Cart</button>

<div class="container">
<input id="name" placeholder="Name"><br>
<input id="number" placeholder="Number"><br>

<button onclick="addCustom()">Add Custom 🛒</button>
</div>

<script>
function addCustom(){
  const name = document.getElementById("name").value;
  const number = document.getElementById("number").value;

  if(!name || !number){
    alert("Fill all fields 😤");
    return;
  }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: `Custom ${name} #${number}`,
    image: "https://dummyimage.com/300x300/000/fff&text=Custom+Jersey"
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Custom added 🎨🔥");
}
</script>

</body>
</html>
