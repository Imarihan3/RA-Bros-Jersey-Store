<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Custom Jersey Builder</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }
header { text-align:center; padding:20px; background:#000; }

.container { display:flex; justify-content:center; padding:40px; }

.builder {
  background:#1a1a1a;
  padding:20px; border-radius:12px;
  width:300px;
}

.preview {
  height:200px;
  background:#222;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:10px;
  text-align:center;
}
</style>
</head>

<body>

<header>
<h1>🎨 Custom Jersey</h1>
<button onclick="location.href='cart.html'">🛒 View Cart</button>
</header>

<div class="container">
<div class="builder">

<div class="preview" id="preview">Your Jersey</div>

<input id="name" placeholder="Name"><br><br>
<input id="number" placeholder="Number"><br><br>

<button onclick="addCustom()">Add Custom 🛒</button>

</div>
</div>

<script type="module">
import { addToCart } from "./firebase.js";

window.addCustom = async function(){
  const name = document.getElementById("name").value;
  const number = document.getElementById("number").value;

  if(!name || !number){
    alert("Fill all fields 😤");
    return;
  }

  const item = {
    name: `Custom ${name} #${number}`,
    image: "https://dummyimage.com/300x300/000/fff&text=Custom+Jersey"
  };

  await addToCart(item);
  alert("Custom added 🎨🔥");
};
</script>

</body>
</html>
