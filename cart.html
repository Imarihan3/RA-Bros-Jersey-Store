<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>

<style>
body {
  font-family:Arial;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:white;
  margin:0;
}

header {
  text-align:center;
  padding:20px;
  background:#000;
  box-shadow:0 0 10px rgba(255,0,80,0.3);
}

.cart-container {
  max-width:800px;
  margin:30px auto;
  padding:20px;
}

.item {
  display:flex;
  align-items:center;
  background:#1f1f1f;
  padding:12px;
  margin-bottom:15px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
  transition:0.2s;
}

.item:hover {
  transform:scale(1.02);
}

.item img {
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}

.info {
  flex:1;
  margin-left:15px;
  text-align:left;
  font-size:16px;
}

.remove {
  background:#ff0033;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

.remove:hover {
  background:#ff1a4d;
}

.empty {
  text-align:center;
  margin-top:50px;
  color:#aaa;
  font-size:18px;
}

.bottom-bar {
  margin-top:20px;
  text-align:center;
}

.checkout {
  padding:14px 25px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c853,#00e676);
  color:black;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.checkout:hover {
  transform:scale(1.05);
}

.back {
  margin-top:10px;
  padding:10px 20px;
  background:#444;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🛒 Your Cart</h1>
</header>

<div class="cart-container">
<div id="cart"></div>

<div class="bottom-bar">
<button class="checkout" onclick="checkout()">Proceed to Buy 💳</button>
<br>
<button class="back" onclick="history.back()">⬅ Back to Store</button>
</div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartDiv = document.getElementById("cart");

function renderCart() {
  cartDiv.innerHTML = "";

  if (cart.length === 0) {
    cartDiv.innerHTML = "<div class='empty'>Your cart is empty 😢</div>";
    return;
  }

  cart.forEach((item, index) => {
    cartDiv.innerHTML += `
      <div class="item">
        <img src="${item.image}">
        <div class="info">${item.name}</div>
        <button class="remove" onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });
}

window.removeItem = function(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
};

renderCart();
</script>

<!-- FIREBASE CHECKOUT -->
<script type="module">
import { db, login } from "./firebase.js";
import { addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

window.checkout = async function() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if (cart.length === 0) {
    alert("Cart empty ❌");
    return;
  }

  try {
    const user = await login();

    for (let item of cart) {
      await addDoc(collection(db, "orders"), {
        email: user.email,
        name: item.name,
        image: item.image,
        time: new Date()
      });
    }

    alert("Order placed 🚀🔥");

    localStorage.removeItem("cart");
    location.reload();

  } catch (e) {
    console.error(e);
    alert("Error ❌");
  }
};
</script>

</body>
</html>
