<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<style>
body { font-family:Arial; background:#111; color:white; padding:20px; }
.item { display:flex; margin:10px 0; }
img { width:60px; height:60px; margin-right:10px; }
button { margin-top:10px; padding:10px; cursor:pointer; }
</style>
</head>

<body>

<h1>🛒 Your Cart</h1>

<div id="cart"></div>
<button onclick="checkout()">Checkout</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartDiv = document.getElementById("cart");

function renderCart(){
  if(cart.length === 0){
    cartDiv.innerHTML = "Cart empty";
    return;
  }

  cartDiv.innerHTML = "";
  cart.forEach((item,i)=>{
    cartDiv.innerHTML += `
      <div class="item">
        <img src="${item.image}">
        <span>${item.name}</span>
        <button onclick="removeItem(${i})">❌</button>
      </div>
    `;
  });
}

function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

renderCart();
</script>

<script type="module">
import { db, login } from "./firebase.js";
import { addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

window.checkout = async function() {
  const currentCart = JSON.parse(localStorage.getItem("cart")) || [];

  if (currentCart.length === 0) {
    alert("Cart empty ❌");
    return;
  }

  try {
    const user = await login();

    await addDoc(collection(db, "orders"), {
      email: user.email,
      items: currentCart, // ✅ FIXED (GROUPED)
      status: "pending",
      time: serverTimestamp()
    });

    alert("Order placed 🚀🔥");

    localStorage.removeItem("cart");
    location.reload();

  } catch (e) {
    console.error(e);
    alert("Error placing order ❌");
  }
};
</script>

</body>
</html>
