<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body { background:#111; color:white; font-family:Arial; text-align:center; }
.item { display:flex; justify-content:space-between; background:#222; margin:10px; padding:10px; }
.item img { width:60px; height:60px; }
</style>
</head>

<body>

<h1>Your Cart</h1>
<div id="cart"></div>

<button onclick="checkout()">Checkout 💳</button>

<script type="module">
import { getCart, checkoutCart } from "./firebase.js";

const div = document.getElementById("cart");

async function load(){
  const items = await getCart();

  if(items.length === 0){
    div.innerHTML = "Empty 😢";
    return;
  }

  items.forEach(i=>{
    div.innerHTML += `
      <div class="item">
        <img src="${i.image}">
        <p>${i.name}</p>
      </div>
    `;
  });
}

window.checkout = async function(){
  await checkoutCart();
};

load();
</script>

</body>
</html>
