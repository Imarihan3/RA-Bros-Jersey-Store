<!DOCTYPE html>
<html>
<head>
<title>Aether Inventory Vault</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Space+Grotesk:wght@300;500;700&display=swap');
:root {
  --paradise-deep: #050a30; --paradise-aqua: #00f2fe; --paradise-pink: #4facfe;
  --neon-gold: #ffcf00; --glass: rgba(255, 255, 255, 0.03);
}
body {
  font-family: 'Space Grotesk', sans-serif; margin: 0; min-height: 100vh; color: #fff;
  background: linear-gradient(rgba(5, 10, 48, 0.7), rgba(0, 0, 0, 0.9)), 
              url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2000&auto=format&fit=crop');
  background-size: cover; background-attachment: fixed; display: flex; flex-direction: column; align-items: center;
}
header { text-align: center; padding: 60px; width: 100%; backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
h1 { font-family: 'Cinzel Decorative', cursive; letter-spacing: 12px; color: var(--neon-gold); text-shadow: 0 0 15px rgba(255,207,0,0.5); }
.cart-container { width: 90% ; max-width: 800px; margin: 40px; padding: 40px; background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; }
.item { display: flex; align-items: center; background: rgba(0,0,0,0.4); padding: 20px; margin-bottom: 20px; border-left: 3px solid var(--paradise-aqua); transition: 0.3s; }
.item:hover { transform: scale(1.02); background: rgba(0,242,254,0.05); }
.item img { width: 80px; height: 80px; object-fit: cover; border: 1px solid #333; }
.info { flex: 1; margin-left: 20px; font-family: 'Cinzel Decorative', cursive; font-size: 1.1rem; }
.remove { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 8px; cursor: pointer; font-family: 'Space Grotesk'; font-size: 10px; letter-spacing: 1px; }
.remove:hover { background: #ff4d4d; color: #fff; }
.checkout { width: 100%; padding: 20px; margin-top: 20px; background: transparent; border: 1px solid var(--neon-gold); color: var(--neon-gold); font-family: 'Cinzel Decorative'; font-weight: 900; letter-spacing: 5px; cursor: pointer; transition: 0.5s; }
.checkout:hover { background: var(--neon-gold); color: #000; box-shadow: 0 0 30px var(--neon-gold); }
.back { margin-top: 20px; background: transparent; border: none; color: #aaa; cursor: pointer; letter-spacing: 2px; }
</style>
</head>
<body>

<header><h1>AETHER VAULT</h1></header>

<div class="cart-container">
  <div id="cart"></div>
  <button class="checkout" onclick="checkout()">COMMAND ORDER 💳</button>
  <center><button class="back" onclick="history.back()">RETURN TO SHELL</button></center>
</div>

<script>
  // UI LOGIC (Removes items from view and localStorage)
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const cartDiv = document.getElementById("cart");

  function renderCart() {
    cartDiv.innerHTML = cart.length === 0 ? "<div style='text-align:center; opacity:0.5;'>ARCHIVE EMPTY</div>" : "";
    cart.forEach((item, index) => {
      cartDiv.innerHTML += `
        <div class="item">
          <img src="${item.image}">
          <div class="info">${item.name}</div>
          <button class="remove" onclick="removeItem(${index})">PRUNE</button>
        </div>`;
    });
  }

  window.removeItem = (index) => {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  };
  renderCart();
</script>

<script type="module">
  // FIREBASE LOGIC (Imports from firebase.js)
  import { db, login } from "./firebase.js";
  import { addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  window.checkout = async function() {
    const currentCart = JSON.parse(localStorage.getItem("cart")) || [];
    if (currentCart.length === 0) return alert("Archive is empty! ❌");

    try {
      const user = await login();
      if (!user) return;

      // Upload all items simultaneously
      await Promise.all(currentCart.map(item => 
        addDoc(collection(db, "orders"), {
          email: user.email,
          name: item.name,
          image: item.image,
          status: "materialized",
          time: serverTimestamp()
        })
      ));

      alert("Order secured in the Eternal Archive! 🚀🔥");
      localStorage.removeItem("cart");
      window.location.reload();
    } catch (e) {
      alert("System Error: " + e.message);
    }
  };
</script>
</body>
</html>
