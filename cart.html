<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>

<style>
body {
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

.item {
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#222;
  padding:10px;
  margin:10px;
  border-radius:8px;
}

.item img {
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:6px;
}

.info {
  flex:1;
  margin-left:10px;
  text-align:left;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.remove {
  background:red;
  color:white;
}

.checkout {
  margin-top:20px;
  padding:12px;
  background:#00c853;
  color:white;
}
</style>
</head>

<body>

<h1>🛒 Your Cart</h1>

<div id="cart"></div>

<button class="checkout" onclick="checkout()">Proceed to Buy 💳</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartDiv = document.getElementById("cart");

function renderCart() {
  cartDiv.innerHTML = "";

  if (cart.length === 0) {
    cartDiv.innerHTML = "<p>Cart empty 😢</p>";
    return;
  }

  cart.forEach((item, index) => {
    cartDiv.innerHTML += `
      <div class="item">
        <img src="${item.image}">
        <div class="info">${item.name}</div>
        <button class="remove" onclick="removeItem(${index})">X</button>
      </div>
    `;
  });
}

window.removeItem = function(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
};

renderCart();
</script>

<!-- 🔥 FIREBASE ONLY FOR CHECKOUT -->
<script type="module">
import { addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { db, login } from "./firebase.js";

window.checkout = async function() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if (cart.length === 0) {
    alert("Cart empty ❌");
    return;
  }

  try {
    const user = await login();

    for (let item of cart) {
      await addDoc(collection(db, "orders"), {
        email: user.email,
        name: item.name,
        image: item.image,
        time: new Date()
      });
    }

    alert("Order placed 🚀");

    localStorage.removeItem("cart");
    location.reload();

  } catch (e) {
    console.error(e);
    alert("Error ❌");
  }
};
</script>

</body>
</html>
