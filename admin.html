<!DOCTYPE html>
<html>
<head>
<title>Admin Orders | RA Bros</title>

<style>
body {
  font-family: Arial;
  background:#0f0f0f;
  color:white;
  padding:20px;
}

h1 {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button {
  padding:10px 15px;
  cursor:pointer;
  border:none;
  border-radius:8px;
}

/* 🔴 DELETE ALL BUTTON */
.deleteAll {
  background:#ff003c;
  color:white;
  font-weight:bold;
}

.deleteAll:hover {
  background:#ff335c;
}

.order {
  border:1px solid #444;
  padding:15px;
  margin-bottom:20px;
  border-radius:10px;
  background:#1a1a1a;
}

.item {
  display:flex;
  align-items:center;
  margin:10px 0;
}

.item img {
  width:60px;
  height:60px;
  object-fit:cover;
  margin-right:10px;
}

.deleteOne {
  margin-top:10px;
  background:#ff4444;
  color:white;
}
</style>
</head>

<body>

<h1>
  📦 Admin Orders
  <button class="deleteAll" onclick="deleteAllOrders()">🧨 DELETE ALL</button>
</h1>

<div id="orders">🔐 Authenticating...</div>

<script type="module">
import { db, auth, login } from "./firebase.js";
import { collection, onSnapshot, query, orderBy, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMIN_EMAIL = "arihan.16jan@gmail.com";
const container = document.getElementById("orders");

let allDocs = []; // store refs for bulk delete

async function init() {
  let user = auth.currentUser;

  if (!user) user = await login();

  if (user.email !== ADMIN_EMAIL) {
    document.body.innerHTML = "<h2>⛔ Access Denied</h2>";
    return;
  }

  loadOrders();
}

function loadOrders() {
  const q = query(collection(db, "orders"), orderBy("time", "desc"));

  onSnapshot(q, (snapshot) => {
    container.innerHTML = "";
    allDocs = [];

    if(snapshot.empty){
      container.innerHTML = "<p>No orders 😴</p>";
      return;
    }

    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      const id = docSnap.id;

      allDocs.push(id);

      let html = `
        <div class="order">
          <h3>👤 ${data.email}</h3>
          <p>Status: ${data.status}</p>
      `;

      if (data.items) {
        data.items.forEach(item => {
          html += `
            <div class="item">
              <img src="${item.image}">
              <span>${item.name}</span>
            </div>
          `;
        });
      }

      html += `
        <button class="deleteOne" onclick="deleteOrder('${id}')">Delete</button>
        </div>
      `;

      container.innerHTML += html;
    });
  });
}

// 🗑️ DELETE ONE
window.deleteOrder = async function(id){
  if(!confirm("Delete this order?")) return;

  await deleteDoc(doc(db,"orders",id));
};

// 💣 DELETE ALL
window.deleteAllOrders = async function(){
  if(!confirm("⚠️ DELETE ALL ORDERS?\nThis cannot be undone.")) return;

  const snapshot = await getDocs(collection(db,"orders"));

  const promises = snapshot.docs.map(d =>
    deleteDoc(doc(db,"orders",d.id))
  );

  await Promise.all(promises);

  alert("All orders deleted 💀");
};

init();
</script>

</body>
</html>
