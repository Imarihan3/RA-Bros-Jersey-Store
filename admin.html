<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA BROS | Admin HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; }
        .neon-text { text-shadow: 0 0 10px #ff0033; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="login-screen" class="fixed inset-0 flex items-center justify-center bg-black z-">
        <div class="text-center">
            <h1 class="text-4xl font-black mb-2 neon-text italic">RA BROS HQ</h1>
            <p class="text-gray-500 mb-8 tracking-widest text-xs">AUTHORIZED ACCESS ONLY</p>
            <button id="loginBtn" class="bg-white text-black px-10 py-4 rounded-full font-black hover:scale-105 transition active:scale-95">
                VERIFY IDENTITY
            </button>
        </div>
    </div>

    <div id="dashboard" class="hidden max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black italic">COMMAND <span class="text-red-600">CENTER</span></h2>
            <div class="text-right">
                <p id="user-tag" class="text-blue-400 font-bold text-sm"></p>
                <button onclick="location.reload()" class="text-[10px] text-gray-600 uppercase hover:text-white">Logout</button>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="glass p-8 h-fit">
                <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span> ADD NEW DROP
                </h3>
                <div class="space-y-4">
                    <input type="text" id="itemName" placeholder="Item Name" class="w-full bg-black/40 border border-white/10 p-3 rounded-lg outline-none focus:border-blue-500 transition">
                    <input type="number" id="itemPrice" placeholder="Price (Coins)" class="w-full bg-black/40 border border-white/10 p-3 rounded-lg outline-none focus:border-blue-500 transition">
                    <button id="submitBtn" class="w-full bg-blue-600 py-4 rounded-lg font-black uppercase tracking-tighter hover:bg-blue-500 transition">PUSH TO VAULT</button>
                </div>
            </div>

            <div class="lg:col-span-2 glass p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> LIVE VAULT
                    </h3>
                    <span id="item-count" class="text-xs bg-white/10 px-2 py-1 rounded text-gray-400">0 Items</span>
                </div>
                
                <div id="inventory-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                    <p class="text-gray-600 italic">Syncing database...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Import the setup from your firebase.js
        import { db, login, addNewItem } from "./firebase.js";
        import { collection, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const adminEmail = "arihan.16jan@gmail.com";

        // Login Handling
        document.getElementById('loginBtn').onclick = async () => {
            try {
                const user = await login();
                if (user.email === adminEmail) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.getElementById('user-tag').innerText = user.email;
                    startLiveFeed();
                } else {
                    alert("Unauthorized access. Identity logged.");
                }
            } catch (err) {
                console.error(err);
            }
        };

        // Saving Handling
        document.getElementById('submitBtn').onclick = async () => {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;

            if (!name || !price) return alert("All fields required!");

            await addNewItem("jerseys", {
                name: name,
                price: Number(price),
                timestamp: serverTimestamp()
            });

            document.getElementById('itemName').value = "";
            document.getElementById('itemPrice').value = "";
        };

        // Live Feed & Delete Logic
        function startLiveFeed() {
            const q = query(collection(db, "jerseys"), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('inventory-list');
                document.getElementById('item-count').innerText = `${snapshot.size} Items`;
                list.innerHTML = "";

                snapshot.forEach((itemDoc) => {
                    const data = itemDoc.data();
                    const itemDiv = document.createElement('div');
                    itemDiv.className = "flex justify-between items-center p-4 bg-white/5 rounded-xl border border-white/5 hover:border-white/20 transition group";
                    
                    itemDiv.innerHTML = `
                        <div>
                            <p class="font-bold text-white">${data.name}</p>
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest">$${data.price} Coins</p>
                        </div>
                        <button class="delete-btn text-xs text-gray-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition" data-id="${itemDoc.id}">
                            DELETE
                        </button>
                    `;
                    list.appendChild(itemDiv);
                });

                // Attach Delete Events
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.onclick = async (e) => {
                        const id = e.target.getAttribute('data-id');
                        if(confirm("Permanently delete this item?")) {
                            await deleteDoc(doc(db, "jerseys", id));
                        }
                    };
                });
            });
        }
    </script>
</body>
</html>
