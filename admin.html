<!DOCTYPE html>
<html>
<head>
<title>Admin Orders | RA Bros</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');

body {
  font-family: 'Outfit', sans-serif;
  background: radial-gradient(circle at top right, #1a1a1a, #050505);
  color: #e0e0e0;
  padding: 40px;
  margin: 0;
  min-height: 100vh;
}

h1 {
  font-size: 2.5rem;
  color: #fff;
  margin-bottom: 30px;
  display: flex;
  align-items: center;
  gap: 15px;
}

h1::before {
  content: '';
  width: 8px;
  height: 40px;
  background: #ff003c;
  border-radius: 4px;
}

#orders {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 20px;
}

.order {
  border: 1px solid rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
  transition: 0.3s;
  position: relative;
}

.order:hover {
  transform: translateY(-10px);
  border-color: #ff003c;
}

.status {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  display: inline-block;
  margin-bottom: 15px;
}

.item {
  display: flex;
  align-items: center;
  margin: 10px 0;
  padding: 8px;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
}

.item img {
  width: 50px;
  height: 50px;
  border-radius: 8px;
  margin-right: 12px;
  object-fit: cover;
}

/* 🗑️ DELETE BUTTON */
.delete-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  background: transparent;
  border: 1px solid #ff003c;
  color: #ff003c;
  padding: 5px 10px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 6px;
  transition: 0.3s;
}

.delete-btn:hover {
  background: #ff003c;
  color: white;
  box-shadow: 0 0 10px #ff003c;
}

.empty {
  opacity: 0.5;
  text-align: center;
  grid-column: 1/-1;
}

.denied {
  text-align: center;
  margin-top: 100px;
  color: #ff003c;
}
</style>
</head>

<body>

<h1>📦 Admin Console</h1>
<div id="orders">🔐 Authenticating...</div>

<script type="module">
import { db, auth, login } from "./firebase.js";
import { 
  collection, 
  onSnapshot, 
  query, 
  orderBy,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const ADMIN_EMAIL = "arihan.16jan@gmail.com";
const container = document.getElementById("orders");

// 🔐 AUTH
function init() {
  onAuthStateChanged(auth, async (user) => {

    if (!user) {
      user = await login();
    }

    if (!user || user.email !== ADMIN_EMAIL) {
      document.body.innerHTML = "<div class='denied'><h2>⛔ ACCESS DENIED</h2></div>";
      return;
    }

    loadOrders();
  });
}

// 🗑️ DELETE FUNCTION
window.deleteOrder = async function(id) {
  const confirmDelete = confirm("Delete this order permanently?");

  if (!confirmDelete) return;

  try {
    await deleteDoc(doc(db, "orders", id));
    alert("Order deleted 🗑️");
  } catch (e) {
    console.error(e);
    alert("Error deleting order");
  }
};

// 📦 LOAD ORDERS
function loadOrders() {
  const q = query(collection(db, "orders"), orderBy("time", "desc"));

  onSnapshot(q, (snapshot) => {
    container.innerHTML = "";

    if (snapshot.empty) {
      container.innerHTML = "<div class='empty'>No orders yet 😴</div>";
      return;
    }

    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      const id = docSnap.id;

      let html = `
        <div class="order">
          <button class="delete-btn" onclick="deleteOrder('${id}')">DELETE</button>

          <div class="status">${data.status || "pending"}</div>
          <h3>${data.email || "Unknown User"}</h3>
      `;

      if (data.items && Array.isArray(data.items)) {
        data.items.forEach(item => {
          html += `
            <div class="item">
              <img src="${item.image || 'https://via.placeholder.com/50'}">
              <span>${item.name}</span>
            </div>
          `;
        });
      } else if (data.name) {
        html += `
          <div class="item">
            <img src="${data.image || 'https://via.placeholder.com/50'}">
            <span>${data.name}</span>
          </div>
        `;
      }

      html += `</div>`;
      container.innerHTML += html;
    });
  });
}

init();
</script>

</body>
</html>
