<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA BROS | Admin HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .neon-border { border: 1px solid #ff0033; box-shadow: 0 0 15px rgba(255, 0, 51, 0.2); }
    </style>
</head>
<body class="p-6">

    <div id="login-screen" class="fixed inset-0 flex items-center justify-center bg-[#050505] z-">
        <div class="text-center">
            <h1 class="text-5xl font-black mb-2 italic tracking-tighter text-white">RA <span class="text-red-600">BROS</span> HQ</h1>
            <p class="text-gray-500 mb-8 tracking-[0.3em] text-[10px]">ENCRYPTED TERMINAL</p>
            <button id="loginBtn" class="bg-white text-black px-12 py-4 rounded-full font-black hover:bg-red-600 hover:text-white transition-all duration-300 transform active:scale-95">
                IDENTITY VERIFICATION
            </button>
        </div>
    </div>

    <div id="dashboard" class="hidden max-w-6xl mx-auto pt-10">
        <div class="flex justify-between items-end mb-12 border-b border-white/10 pb-6">
            <div>
                <h2 class="text-3xl font-black italic uppercase">Vault <span class="text-red-600">Management</span></h2>
                <p id="user-tag" class="text-blue-500 font-mono text-xs mt-1 tracking-widest"></p>
            </div>
            <button onclick="location.reload()" class="text-xs bg-white/5 px-4 py-2 rounded-full hover:bg-red-900/30 border border-white/10 transition">LOCK TERMINAL</button>
        </div>

        <div class="grid lg:grid-cols-3 gap-10">
            <div class="glass p-8 h-fit neon-border">
                <h3 class="text-sm font-bold mb-6 text-gray-400 uppercase tracking-widest">Deploy New Item</h3>
                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 ml-1">ITEM NAME</label>
                        <input type="text" id="itemName" placeholder="e.g. Red Velocity" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-red-600 transition text-white">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 ml-1">COIN VALUE</label>
                        <input type="number" id="itemPrice" placeholder="500" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-red-600 transition text-white">
                    </div>
                    <button id="submitBtn" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase mt-4 hover:bg-red-500 shadow-lg shadow-red-900/20 transition-all">UPLOAD TO LIVE SERVER</button>
                </div>
            </div>

            <div class="lg:col-span-2 glass p-8">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Live Database Feed</h3>
                    <div class="flex items-center gap-3">
                        <span id="item-count" class="text-[10px] font-mono bg-white/5 px-3 py-1 rounded-full border border-white/10 text-blue-400">0 DOCUMENTS</span>
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    </div>
                </div>
                
                <div id="inventory-list" class="space-y-3 max-h-[600px] overflow-y-auto pr-4 custom-scrollbar">
                    <p class="text-gray-700 animate-pulse">Waiting for handshake...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, login, addNewItem } from "./firebase.js";
        import { collection, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // THE ONLY EMAIL ALLOWED
        const ADMIN_EMAIL = "arihan.16jan@gmail.com";

        const loginBtn = document.getElementById('loginBtn');
        const loginScreen = document.getElementById('login-screen');
        const dashboard = document.getElementById('dashboard');
        const userTag = document.getElementById('user-tag');

        // --- AUTHENTICATION GATE ---
        loginBtn.onclick = async () => {
            try {
                const user = await login();
                
                if (user.email === ADMIN_EMAIL) {
                    // SUCCESS: Reveal the dashboard
                    loginScreen.classList.add('hidden');
                    dashboard.classList.remove('hidden');
                    userTag.innerText = `CONNECTED AS: ${user.email.toUpperCase()}`;
                    initLiveInventory();
                } else {
                    // FAIL: Kick them out
                    alert("UNAUTHORIZED ACCESS: This incident will be reported.");
                    window.location.href = "index.html"; // Redirect to game
                }
            } catch (err) {
                console.error("Auth Failure:", err);
            }
        };

        // --- UPLOAD LOGIC ---
        document.getElementById('submitBtn').onclick = async () => {
            const nameField = document.getElementById('itemName');
            const priceField = document.getElementById('itemPrice');

            if (!nameField.value || !priceField.value) {
                alert("Missing Parameters.");
                return;
            }

            try {
                await addNewItem("jerseys", {
                    name: nameField.value.trim(),
                    price: Number(priceField.value),
                    timestamp: serverTimestamp()
                });
                nameField.value = "";
                priceField.value = "";
            } catch (e) {
                alert("Push Failed. Check Console.");
            }
        };

        // --- LIVE DATA FEED ---
        function initLiveInventory() {
            const q = query(collection(db, "jerseys"), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('inventory-list');
                document.getElementById('item-count').innerText = `${snapshot.size} DOCUMENTS`;
                list.innerHTML = "";

                snapshot.forEach((itemDoc) => {
                    const data = itemDoc.data();
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center p-5 bg-white/[0.03] rounded-2xl border border-white/5 hover:bg-white/[0.06] hover:border-red-600/30 transition-all group";
                    
                    div.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-red-600/10 rounded-full flex items-center justify-center text-red-500 font-black text-xs italic">RA</div>
                            <div>
                                <p class="font-bold text-white tracking-tight">${data.name}</p>
                                <p class="text-[9px] text-gray-500 uppercase tracking-widest mt-0.5">${data.price} Coins • ${itemDoc.id.substring(0,6)}</p>
                            </div>
                        </div>
                        <button class="delete-btn opacity-0 group-hover:opacity-100 bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white px-4 py-2 rounded-lg text-[10px] font-black transition-all" data-id="${itemDoc.id}">
                            DELETE
                        </button>
                    `;
                    list.appendChild(div);
                });

                // Attach Delete logic
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.onclick = async (e) => {
                        const id = e.target.getAttribute('data-id');
                        if(confirm("Confirm deletion from server?")) {
                            await deleteDoc(doc(db, "jerseys", id));
                        }
                    };
                });
            });
        }
    </script>
</body>
</html>
