<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Limited Jerseys</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

header {
  text-align:center;
  padding:20px;
  background:#000;
}

.grid {
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
  padding:40px;
}

.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  width:260px;
  text-align:center;
  position:relative;
  box-shadow:0 0 15px rgba(255,0,80,0.4);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-6px);
  box-shadow:0 0 30px rgba(255,0,80,0.9);
}

img {
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:10px;
}

.badge {
  position:absolute;
  top:10px;
  left:10px;
  background:#ff0033;
  padding:5px 10px;
  font-size:12px;
  border-radius:6px;
}

.btn {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff0033;
  color:white;
  cursor:pointer;
  width:100%;
}

.btn:hover {
  background:#ff1a4d;
}
</style>
</head>

<body>

<header>
<h1>🔥 Limited Drops</h1>
</header>

<div class="grid">

<div class="card">
<span class="badge">LIMITED</span>
<img src="https://imarihan3.github.io/RA-Bros-Jersey-Store/jersey1.jpeg">
<p>Phantom Blue Aura</p>
<button class="btn" onclick="addToCart('Phantom Blue Aura')">Add</button>
</div>

<div class="card">
<span class="badge">RARE</span>
<img src="https://imarihan3.github.io/RA-Bros-Jersey-Store/jersey2.jpeg">
<p>Dragon Black Elite</p>
<button class="btn" onclick="addToCart('Dragon Black Elite')">Add</button>
</div>

<div class="card">
<span class="badge">DROP</span>
<img src="https://imarihan3.github.io/RA-Bros-Jersey-Store/jersey3.jpeg">
<p>Pink Velocity</p>
<button class="btn" onclick="addToCart('Pink Velocity')">Add</button>
</div>

<div class="card">
<span class="badge">LIMITED</span>
<img src="https://imarihan3.github.io/RA-Bros-Jersey-Store/jersey4.jpeg">
<p>Samurai White</p>
<button class="btn" onclick="addToCart('Samurai White')">Add</button>
</div>

<div class="card">
<span class="badge">RARE</span>
<img src="https://imarihan3.github.io/RA-Bros-Jersey-Store/jersey5.jpeg">
<p>Phoenix Storm</p>
<button class="btn" onclick="addToCart('Phoenix Storm')">Add</button>
</div>

</div>

<script type="module">
import { addItem } from "./firebase.js";

window.addToCart = async function(item) {
  console.log("Clicked:", item);

  try {
    await addItem(item);
    alert(item + " added 🛒🔥");
  } catch (e) {
    console.error(e);
    alert("Error saving ❌");
  }
};
</script>

</body>
</html>
