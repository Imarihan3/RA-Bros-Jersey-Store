<!DOCTYPE html>
<html>
<head>
<title>Limited Jerseys</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
header { text-align:center; padding:20px; }

.grid {
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  padding:40px;
}

.card {
  background:#1a1a1a;
  padding:10px;
  width:240px;
  border-radius:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:240px;
  object-fit:cover;
  border-radius:10px;
}

button {
  margin-top:10px;
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🔥 Limited Jerseys</h1>
<button onclick="location.href='cart.html'">🛒 Cart</button>
</header>

<div class="grid">

<div class="card">
<img src="https://imarihan3.github.io/RA-Bros-Jersey-Store/jersey1.jpeg">
<p>Phantom Blue Aura</p>
<button onclick="addToCart('Phantom Blue Aura','https://imarihan3.github.io/RA-Bros-Jersey-Store/jersey1.jpeg')">Add</button>
</div>

<div class="card">
<img src="https://imarihan3.github.io/RA-Bros-Jersey-Store/jersey2.jpeg">
<p>Dragon Black Elite</p>
<button onclick="addToCart('Dragon Black Elite','https://imarihan3.github.io/RA-Bros-Jersey-Store/jersey2.jpeg')">Add</button>
</div>

</div>

<script>
function addToCart(name, image){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({ name, image });
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(name + " added 🔥");
}
</script>

</body>
</html>
