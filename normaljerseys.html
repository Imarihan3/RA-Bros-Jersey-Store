<!DOCTYPE html>
<html>
<head>
<title>⚽ Everyday Jerseys</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

header {
  text-align:center;
  padding:20px;
  background:#111;
  color:white;
}

.grid {
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  padding:40px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  width:230px;
  text-align:center;
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:10px;
}

button {
  margin-top:10px;
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>⚽ Everyday Jerseys</h1>
<button onclick="location.href='cart.html'">🛒 Cart</button>
</header>

<div class="grid" id="grid"></div>

<script>
const items = [
{name:"Pelé", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSs2cpsxkRZN1s-LTr-3gLBOhDUD79mpcRFLA&s"},
{name:"Diego Maradona", img:"https://m.media-amazon.com/images/I/71zewDlzHbL._AC_UY1100_.jpg"},
{name:"Lionel Messi", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6w4qaaNxvx5l01G958Jv-Y7N9gKAEKVbF6Q&s"},
{name:"Cristiano Ronaldo", img:"https://m.media-amazon.com/images/I/61Vq0NatbbL._AC_UY1100_.jpg"},
{name:"Zinedine Zidane", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTmKyoLfibamHvyu-EmqrwWbArfdRNqSMg8Bw&s"},
{name:"Johan Cruyff", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7vbGHf4cZnMksP6J4MqCc1yJHUBYlxL0ICA&s"},
{name:"Ronaldo Nazário", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRXav2vwjnPh10jfmh1XoFafpvCUBKOhzaEFw&s"},
{name:"David Beckham", img:"https://m.media-amazon.com/images/I/61F0kQC81uL._SL1500_.jpg"},
{name:"Thierry Henry", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmZbpi7oozH3XrsKVyMrSr27do3Rd8UASnhg&s"},
{name:"Paolo Maldini", img:"https://m.media-amazon.com/images/I/71nswOq+vcL._AC_UY1100_.jpg"},
{name:"Andrés Iniesta", img:"https://m.media-amazon.com/images/I/51w+fQjpzML._AC_SY1000_.jpg"},
{name:"George Best", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxc-uTzOZJA9FzaSTLIvjpxhNe9mQj2bfoqA&s"},
{name:"Franz Beckenbauer", img:"https://campeonsports.com/cdn/shop/files/rn-image_picker_lib_temp_e91f1749-f65a-48d1-9c59-a05639414de4.jpg?v=1765488226"},
{name:"Gerd Müller", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRR3VMddTDYB4pniIPAWMmRPYhjVSlJi2rPsQ&s"},
{name:"Kaka", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSdFnI68y9rY4mj14aC3318gXykSzfDR6vZkw&s"},
{name:"Andrea Pirlo", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRpXHdVwOW0JcQR_vuxkoD9BKmY7sgAvesjGg&s"},
{name:"Roberto Carlos", img:"https://m.media-amazon.com/images/I/41Ii+81GA3L.jpg"},
{name:"Ronaldinho", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTHB_0JhOpb5aU67b4IKOefRD9VjvPWtER7OQ&s"},
{name:"Lev Yashin", img:"https://m.media-amazon.com/images/I/51kO15IYIoL._AC_UF894,1000_QL80_.jpg"},
{name:"Trent Alexander-Arnold", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTOnj_v8N2R3mA8297Ge_Bcqx0Nr8g-ldoAnw&s"}
];

const grid = document.getElementById("grid");

items.forEach(i=>{
  grid.innerHTML += `
    <div class="card">
      <img src="${i.img}">
      <p>${i.name}</p>
      <button onclick="addToCart('${i.name}','${i.img}')">Add</button>
    </div>
  `;
});

function addToCart(name,image){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({name,image});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(name + " added 🛒🔥");
}
</script>

</body>
</html>
