<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Normal Jerseys</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }
header { text-align:center; padding:20px; background:#111; color:white; }

.cart-btn {
  margin-top:10px; padding:10px 15px;
  border:none; border-radius:8px;
  background:#ff9800; color:white; cursor:pointer;
}

.grid {
  display:flex; gap:20px; flex-wrap:wrap;
  justify-content:center; padding:40px;
}

.card {
  background:white; padding:15px;
  border-radius:10px; width:250px;
  text-align:center;
}

.card img {
  width:100%; height:250px;
  object-fit:cover; border-radius:10px;
}

.btn {
  margin-top:10px; padding:12px;
  border:none; border-radius:10px;
  background:#111; color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🛍️ Everyday Jerseys</h1>
<button class="cart-btn" onclick="location.href='cart.html'">🛒 View Cart</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { addToCart } from "./firebase.js";

const names = [
"Classic Home","Away White","Blue Strike","Red Force","Urban Fit",
"Street Pro","Elite Black","Royal Blue","Sunset Orange","Forest Green"
];

const images = [
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSs2cpsxkRZN1s-LTr-3gLBOhDUD79mpcRFLA&s",
"https://m.media-amazon.com/images/I/71zewDlzHbL._AC_UY1100_.jpg",
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6w4qaaNxvx5l01G958Jv-Y7N9gKAEKVbF6Q&s",
"https://m.media-amazon.com/images/I/61Vq0NatbbL._AC_UY1100_.jpg",
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTmKyoLfibamHvyu-EmqrwWbArfdRNqSMg8Bw&s",
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7vbGHf4cZnMksP6J4MqCc1yJHUBYlxL0ICA&s",
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRXav2vwjnPh10jfmh1XoFafpvCUBKOhzaEFw&s",
"https://m.media-amazon.com/images/I/61F0kQC81uL._SL1500_.jpg",
"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmZbpi7oozH3XrsKVyMrSr27do3Rd8UASnhg&s",
"https://m.media-amazon.com/images/I/71nswOq+vcL._AC_UY1100_.jpg"
];

const grid = document.getElementById("grid");

names.forEach((name, i) => {
  grid.innerHTML += `
    <div class="card">
      <img src="${images[i]}">
      <p>${name}</p>
      <button class="btn" onclick="add('${name}','${images[i]}')">Add</button>
    </div>
  `;
});

window.add = async function(name, image){
  await addToCart({ name, image });
  alert("Added 🛒");
};
</script>

</body>
</html>
