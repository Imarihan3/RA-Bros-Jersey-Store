<!DOCTYPE html>
<html>
<head>
<title>Normal Jerseys</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }
header { background:#111; color:white; text-align:center; padding:20px; }

.grid {
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  padding:40px;
}

.card {
  background:white;
  padding:10px;
  width:230px;
  border-radius:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:10px;
}

button {
  margin-top:10px;
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🛍️ Normal Jerseys</h1>
<button onclick="location.href='cart.html'">🛒 Cart</button>
</header>

<div class="grid" id="grid"></div>

<script>
const items = [
  {name:"Classic Home", img:"https://m.media-amazon.com/images/I/71zewDlzHbL._AC_UY1100_.jpg"},
  {name:"Blue Strike", img:"https://m.media-amazon.com/images/I/61Vq0NatbbL._AC_UY1100_.jpg"},
  {name:"Urban Fit", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTmKyoLfibamHvyu-EmqrwWbArfdRNqSMg8Bw&s"}
];

const grid = document.getElementById("grid");

items.forEach(i=>{
  grid.innerHTML += `
    <div class="card">
      <img src="${i.img}">
      <p>${i.name}</p>
      <button onclick="addToCart('${i.name}','${i.img}')">Add</button>
    </div>
  `;
});

function addToCart(name, image){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({ name, image });
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(name + " added 🛒");
}
</script>

</body>
</html>
