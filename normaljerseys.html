<!DOCTYPE html>

<html>

<head>

<title>🏝️ Paradise Jerseys</title>



<style>

:root {

  /* Paradise Palette: Ocean Blue, Sunset Pink, and White Sand */

  --paradise-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);

  --sunset-accent: #ff9a9e;

  --glass: rgba(255, 255, 255, 0.25);

  --card-text: #2d3436;

}



body { 

  margin: 0; 

  font-family: 'Poppins', 'Segoe UI', sans-serif; 

  /* A soft, beachy gradient background */

  background: linear-gradient(to bottom, #e0c3fc 0%, #8ec5fc 100%);

  background-attachment: fixed;

  color: #333; 

  min-height: 100vh;

}



header {

  text-align: center;

  padding: 60px 20px;

  background: rgba(255, 255, 255, 0.15);

  backdrop-filter: blur(10px);

  -webkit-backdrop-filter: blur(10px);

  border-bottom: 1px solid rgba(255, 255, 255, 0.3);

  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);

}



h1 {

  margin: 0;

  font-size: 3rem;

  font-weight: 800;

  color: #ffffff;

  text-transform: uppercase;

  letter-spacing: 4px;

  text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);

}



.grid {

  display: flex;

  flex-wrap: wrap;

  gap: 40px;

  justify-content: center;

  padding: 60px 20px;

}



/* Glassmorphism Cards */

.card {

  background: var(--glass);

  backdrop-filter: blur(15px);

  -webkit-backdrop-filter: blur(15px);

  padding: 20px;

  border-radius: 30px;

  width: 260px;

  text-align: center;

  border: 1px solid rgba(255, 255, 255, 0.4);

  box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);

  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);

}



.card:hover {

  transform: translateY(-15px) scale(1.02);

  background: rgba(255, 255, 255, 0.4);

  box-shadow: 0 15px 45px rgba(0, 0, 0, 0.1);

}



.card img {

  width: 100%;

  height: 280px;

  object-fit: cover;

  border-radius: 20px;

  box-shadow: 0 10px 20px rgba(0,0,0,0.1);

}



.card p {

  font-weight: 600;

  font-size: 1.2rem;

  color: var(--card-text);

  margin: 20px 0 15px 0;

}



/* Paradise Button Styling */

button {

  background: white;

  color: #8ec5fc;

  border: none;

  padding: 12px 30px;

  border-radius: 50px;

  font-weight: bold;

  text-transform: uppercase;

  letter-spacing: 1px;

  cursor: pointer;

  transition: all 0.3s ease;

  box-shadow: 0 4px 15px rgba(0,0,0,0.1);

}



button:hover {

  background: var(--sunset-accent);

  color: white;

  transform: scale(1.1);

  box-shadow: 0 8px 25px rgba(255, 154, 158, 0.4);

}



header button {

  margin-top: 20px;

  background: rgba(255,255,255,0.8);

  color: #667eea;

}



/* Subtle Floating Animation for the grid */

@keyframes float {

  0% { transform: translateY(0px); }

  50% { transform: translateY(-10px); }

  100% { transform: translateY(0px); }

}



.card:nth-child(even) {

  animation: float 6s ease-in-out infinite;

}



/* Custom Scrollbar */

::-webkit-scrollbar { width: 10px; }

::-webkit-scrollbar-track { background: #f1f1f1; }

::-webkit-scrollbar-thumb { 

  background: linear-gradient(#ff9a9e, #fad0c4); 

  border-radius: 10px; 

}



</style>

</head>

function addToCart(name,image){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
