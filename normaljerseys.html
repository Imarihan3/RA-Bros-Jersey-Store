<div class="grid" id="grid"></div>

<script type="module">
import { db, collection, query, where, onSnapshot } from "./firebase.js";

const grid = document.getElementById("grid");
const q = query(collection(db, "jerseys"), where("store", "==", "normal"));

onSnapshot(q, (snapshot) => {
    grid.innerHTML = "";
    snapshot.forEach((doc) => {
        const item = doc.data();
        grid.innerHTML += `
            <div class="card">
                <img src="${item.image}" onerror="this.src='https://via.placeholder.com/280?text=Jersey'">
                <p>${item.name}</p>
                <button onclick="addToCart('${item.name}','${item.image}')">Add to Cart</button>
            </div>`;
    });
});

window.addToCart = (name, image) => {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push({name, image, price: 1000});
    localStorage.setItem("cart", JSON.stringify(cart));
    alert(name + " added to Paradise 🏝️");
};
</script>
