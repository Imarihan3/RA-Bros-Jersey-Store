<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RA Bros 3D - Ultimate Glow</title>

<style>
body { margin:0; overflow:hidden; background:#87CEEB; font-family:sans-serif; touch-action:none; }

#overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.8); color:white;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:2000; cursor:pointer;
}

#ui {
  position:absolute; top:10px; left:10px;
  color:#fff; background:rgba(0,40,0,0.8);
  padding:15px; border-radius:10px; z-index:100;
}

#enterBtn {
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  background:#ff0033;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:bold;
  display:none;
  z-index:2000;
  box-shadow: 0 0 50px #ff0033;
}

#joystick-container {
  position:absolute; bottom:50px; left:50px;
  width:120px; height:120px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  z-index:1500;
  display:none;
}

#joystick-knob {
  position:absolute; top:30px; left:30px;
  width:60px; height:60px;
  background:rgba(255,255,255,0.5);
  border-radius:50%;
}

.label {
  position:absolute;
  color:white;
  background:rgba(0,0,0,0.8);
  padding:5px 10px;
  border-radius:5px;
  border:1px solid white;
  font-weight:bold;
  transform:translate(-50%,-100%);
  pointer-events: none;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<div id="overlay" onclick="startApp()">
  <h1>RA BROS 3D STADIUM</h1>
  <p>Move with joystick • Go near shop • Press ENTER</p>
</div>

<div id="ui">🏟️ Explore Stores</div>

<button id="enterBtn">ENTER STORE</button>

<div id="joystick-container">
  <div id="joystick-knob"></div>
</div>

<div id="l1" class="label">NORMAL JERSEYS</div>
<div id="l2" class="label">LIMITED JERSEYS</div>
<div id="l3" class="label">CUSTOM JERSEYS</div>

<script>
window.onload = function() {

let joyPos = { x: 0, y: 0 };
let isMoving = false;
let currentStore = null;

window.startApp = function() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('joystick-container').style.display = 'block';
  init3D();
  setupJoystick();
};

function setupJoystick() {
  const container = document.getElementById('joystick-container');
  const knob = document.getElementById('joystick-knob');
  let rect;
  const centerX = 60;
  const centerY = 60;

  function move(e) {
    if (!isMoving) return;
    if (e.cancelable) e.preventDefault();
    const clientX = e.touches ? e.touches.clientX : e.clientX;
    const clientY = e.touches ? e.touches.clientY : e.clientY;
    let x = clientX - rect.left - centerX;
    let y = clientY - rect.top - centerY;
    const dist = Math.min(Math.sqrt(x*x + y*y), 50);
    const angle = Math.atan2(y, x);
    x = Math.cos(angle) * dist;
    y = Math.sin(angle) * dist;
    knob.style.transform = `translate(${x}px, ${y}px)`;
    joyPos = { x: x/50, y: y/50 };
  }

  container.addEventListener('touchstart', e => { isMoving = true; rect = container.getBoundingClientRect(); move(e); }, {passive:false});
  window.addEventListener('touchmove', move, {passive:false});
  window.addEventListener('touchend', () => { isMoving = false; knob.style.transform = 'translate(0px,0px)'; joyPos = {x:0,y:0}; });
  container.addEventListener('mousedown', e => { isMoving = true; rect = container.getBoundingClientRect(); move(e); });
  window.addEventListener('mousemove', move);
  window.addEventListener('mouseup', () => { isMoving = false; knob.style.transform = 'translate(0px,0px)'; joyPos = {x:0,y:0}; });
}

function init3D() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);

  const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // Global Lighting
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const sun = new THREE.DirectionalLight(0xffffff, 0.6);
  sun.position.set(10,20,10);
  scene.add(sun);

  // Fast Loading Floor with Light Reception
  const loader = new THREE.TextureLoader();
  const grassTex = loader.load("https://threejs.org/examples/textures/terrain/grasslight-big.jpg");
  grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
  grassTex.repeat.set(20,20);
  
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(100,100),
    new THREE.MeshPhongMaterial({ map: grassTex, shininess: 10 })
  );
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // Field Lines
  const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const yLine = 0.02;
  const centerLine = new THREE.Mesh(new THREE.PlaneGeometry(100,0.3), lineMat);
  centerLine.rotation.x = -Math.PI/2;
  centerLine.position.y = yLine;
  scene.add(centerLine);

  const circle = new THREE.Mesh(new THREE.RingGeometry(9,9.5,32), lineMat);
  circle.rotation.x = -Math.PI/2;
  circle.position.y = yLine;
  scene.add(circle);

  function box(z){
    const b = new THREE.Mesh(new THREE.PlaneGeometry(20,8), lineMat);
    b.rotation.x = -Math.PI/2;
    b.position.set(0,yLine,z);
    scene.add(b);
  }
  box(40); box(-40);

  function createGoal(x, z) {
    const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const width = 7.32; const height = 2.44; const depth = 2;
    const left = new THREE.Mesh(new THREE.BoxGeometry(0.2,height,0.2), material);
    left.position.set(x - width/2, height/2, z);
    const right = new THREE.Mesh(new THREE.BoxGeometry(0.2,height,0.2), material);
    right.position.set(x + width/2, height/2, z);
    const top = new THREE.Mesh(new THREE.BoxGeometry(width,0.2,0.2), material);
    top.position.set(x, height, z);
    const backTop = new THREE.Mesh(new THREE.BoxGeometry(width,0.2,0.2), material);
    backTop.position.set(x, height, z - depth);
    const backLeft = new THREE.Mesh(new THREE.BoxGeometry(0.2,height,0.2), material);
    backLeft.position.set(x - width/2, height/2, z - depth);
    const backRight = new THREE.Mesh(new THREE.BoxGeometry(0.2,height,0.2), material);
    backRight.position.set(x + width/2, height/2, z - depth);
    scene.add(left, right, top, backTop, backLeft, backRight);
  }
  createGoal(0, 50); createGoal(0, -50);

  const player = new THREE.Mesh(
    new THREE.BoxGeometry(2,2,2),
    new THREE.MeshPhongMaterial({color:0xffffff})
  );
  player.position.y = 1;
  scene.add(player);

  const stores = [];

  function addStore(x, z, color, url, labelId) {
    const group = new THREE.Group();
    group.position.set(x, 0, z);

    // Generator Disc
    const discGeo = new THREE.CylinderGeometry(3.5, 3.5, 0.4, 32);
    const discMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
    const disc = new THREE.Mesh(discGeo, discMat);
    disc.position.y = 0.2;
    group.add(disc);

    const ringGeo = new THREE.TorusGeometry(3.2, 0.1, 16, 100);
    const ringMat = new THREE.MeshBasicMaterial({ color: color });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI/2;
    ring.position.y = 0.41;
    group.add(ring);

    // HOLOGRAM
    const holoGroup = new THREE.Group();
    holoGroup.position.y = 5;

    const geometry = new THREE.IcosahedronGeometry(2.8, 0);
    
    // Wireframe
    const wireframe = new THREE.WireframeGeometry(geometry);
    const lineMat = new THREE.LineBasicMaterial({ color: color, linewidth: 3 });
    const lineMesh = new THREE.LineSegments(wireframe, lineMat);
    holoGroup.add(lineMesh);

    // CORE EMISSION
    const coreMat = new THREE.MeshStandardMaterial({
      color: color,
      transparent: true,
      opacity: 0.8,
      emissive: color,
      emissiveIntensity: 100 
    });
    const coreMesh = new THREE.Mesh(geometry, coreMat);
    holoGroup.add(coreMesh);

    // White Core
    const innerGeo = new THREE.IcosahedronGeometry(1.8, 0);
    const innerMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const innerCore = new THREE.Mesh(innerGeo, innerMat);
    holoGroup.add(innerCore);

    group.add(holoGroup);

    // ⚡ LIGHT HIT ON GRASS - Higher intensity, lower decay
    const pLight = new THREE.PointLight(color, 80, 25); 
    pLight.decay = 1.5; 
    pLight.position.y = 4.5;
    group.add(pLight);

    group.userData = { url, label: document.getElementById(labelId), holoGroup };
    scene.add(group);
    stores.push(group);
  }

  addStore(-20,-20, 0xff0000, "https://imarihan3.github.io/RA-Bros-Jersey-Store/normaljerseys.html", "l1");
  addStore(0,-35, 0x00ff00, "https://imarihan3.github.io/RA-Bros-Jersey-Store/lejerseys.html", "l2");
  addStore(20,-20, 0x00ffff, "https://imarihan3.github.io/RA-Bros-Jersey-Store/customisablejerseys.html", "l3");

  const enterBtn = document.getElementById("enterBtn");

  function animate() {
    requestAnimationFrame(animate);

    const time = Date.now() * 0.002;
    stores.forEach(s => {
      s.userData.holoGroup.rotation.y += 0.02;
      s.userData.holoGroup.position.y = 5 + Math.sin(time) * 0.5;
    });

    if (Math.abs(joyPos.y) > 0.1) player.translateZ(joyPos.y * 0.5);
    if (Math.abs(joyPos.x) > 0.1) player.rotation.y -= joyPos.x * 0.05;

    const camPos = new THREE.Vector3(0,8,15).applyQuaternion(player.quaternion).add(player.position);
    camera.position.lerp(camPos, 0.1);
    camera.lookAt(player.position);

    currentStore = null;
    stores.forEach(s => {
      const dist = player.position.distanceTo(s.position);
      const v = s.position.clone().add(new THREE.Vector3(0,5,0)).project(camera);
      s.userData.label.style.left = (v.x*0.5+0.5)*innerWidth+'px';
      s.userData.label.style.top = (v.y*-0.5+0.5)*innerHeight-40+'px';
      if (dist < 6) currentStore = s;
    });

    enterBtn.style.display = currentStore ? "block" : "none";
    renderer.render(scene, camera);
  }

  animate();

  enterBtn.onclick = () => { if (currentStore) window.location.href = currentStore.userData.url; };
  window.onkeydown = e => { if (e.key === "Enter" && currentStore) window.location.href = currentStore.userData.url; };
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}
};
</script>

</body>
</html>
