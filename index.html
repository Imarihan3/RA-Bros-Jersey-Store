<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Custom Jersey Builder</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }
header { text-align:center; padding:20px; background:#000; }

.container {
  display:flex;
  justify-content:center;
  padding:40px;
}

.builder {
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
  width:300px;
  box-shadow:0 0 15px rgba(255,0,80,0.3);
}

.preview {
  height:250px;
  border-radius:10px;
  background:linear-gradient(135deg,#1f1f1f,#2a2a2a);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:15px;
  text-align:center;
  white-space:pre-line;
}

.btn {
  padding:8px 12px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#333;
  color:white;
}

.btn:hover { background:#ff0033; }

.btn-primary {
  width:100%;
  margin-top:10px;
  background:#ff0033;
}

input {
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
  margin-top:5px;
}
</style>
</head>

<body>

<header>
<h1>🎨 Custom Jersey Builder</h1>
<p>Create your own drip</p>

<button onclick="location.href='cart.html'" 
style="margin-top:10px;padding:10px;border:none;border-radius:8px;background:#ff9800;color:white;cursor:pointer;">
🛒 View Cart
</button>
</header>

<div class="container">
<div class="builder">

<div class="preview" id="preview">Your Jersey</div>

<p>Color:</p>
<button class="btn" onclick="setOption('color','Black')">Black</button>
<button class="btn" onclick="setOption('color','Red')">Red</button>
<button class="btn" onclick="setOption('color','Blue')">Blue</button>

<p>Style:</p>
<button class="btn" onclick="setOption('style','Home')">Home</button>
<button class="btn" onclick="setOption('style','Away')">Away</button>
<button class="btn" onclick="setOption('style','Street')">Street</button>

<p>Number:</p>
<input type="number" id="number" placeholder="Enter number" oninput="updatePreview()">

<p>Name:</p>
<input type="text" id="name" placeholder="Enter name" oninput="updatePreview()">

<button class="btn btn-primary" onclick="addToCart()">Add Custom Jersey 🛒</button>

</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { addItem } from "./firebase.js";

let jersey = {
  color: '',
  style: '',
  number: '',
  name: ''
};

// SET OPTIONS
window.setOption = function(type, value) {
  jersey[type] = value;
  updatePreview();
};

// UPDATE PREVIEW
window.updatePreview = function() {
  jersey.number = document.getElementById('number').value;
  jersey.name = document.getElementById('name').value;

  document.getElementById('preview').innerText =
    `${jersey.color || "?"} ${jersey.style || "?"}\n${jersey.name || "NAME"} #${jersey.number || "00"}`;
};

// ADD TO FIREBASE
window.addToCart = async function() {
  try {
    // Always refresh values
    jersey.number = document.getElementById('number').value;
    jersey.name = document.getElementById('name').value;

    // Prevent empty data
    if (!jersey.color || !jersey.style || !jersey.number || !jersey.name) {
      alert("Fill everything first bro 😭");
      return;
    }

    const itemString =
      `${jersey.color} ${jersey.style} | ${jersey.name} #${jersey.number}`;

    console.log("Saving:", itemString);

    await addItem(itemString);

    alert("Saved to cart 🛒🔥");

  } catch (e) {
    console.error("ERROR:", e);
    alert("Firebase error ❌");
  }
};
</script>

</body>
</html>
