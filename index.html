<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RA Bros Jersey Store</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: #fff;
            background: rgba(0, 40, 0, 0.9); padding: 15px;
            border: 2px solid #fff; border-radius: 10px; z-index: 100;
        }
        .label {
            position: absolute; color: white; background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px; border-radius: 5px; border: 1px solid white;
            font-weight: bold; pointer-events: none; transform: translate(-50%, -100%);
            z-index: 50;
        }
        /* Loading Screen Feedback */
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.8); color: #0f0; font-size: 40px; font-weight: bold;
            display: none; justify-content: center; align-items: center; z-index: 999;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0; color:#0f0;">JERSEY STADIUM</h2>
        <p>Move: <b>W, A, S, D</b></p>
    </div>

    <div id="loading-screen">ENTERING STORE...</div>

    <div id="l1" class="label">NORMAL JERSEYS</div>
    <div id="l2" class="label">LIMITED EDITION</div>
    <div id="l3" class="label">CUSTOMISABLE</div>

    <script>
        // 1. ENGINE SETUP
        var scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        var camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        var renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. LIGHTING
        var light = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(light);
        var sun = new THREE.DirectionalLight(0xffffff, 0.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // 3. THE COURT (Pitch)
        var floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshBasicMaterial({ color: 0x2d5a27 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        var grid = new THREE.GridHelper(100, 20, 0xffffff, 0x447744);
        grid.position.y = 0.02;
        scene.add(grid);

        // 4. GOALPOSTS
        function makeGoal(z) {
            var g = new THREE.Group();
            var m = new THREE.MeshBasicMaterial({ color: 0xffffff });
            var p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 8), m); p1.position.set(-8, 4, 0);
            var p2 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 8), m); p2.position.set(8, 4, 0);
            var bar = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 16), m); bar.rotation.z = Math.PI/2; bar.position.set(0, 8, 0);
            g.add(p1, p2, bar); g.position.z = z;
            scene.add(g);
        }
        makeGoal(-48); makeGoal(48);

        // 5. PLAYER (White Cube)
        var player = new THREE.Mesh(
            new THREE.BoxGeometry(1.5, 1.5, 1.5),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        player.position.y = 0.75;
        scene.add(player);

        // 6. JERSEY BLOCKS
        var blocks = [];
        function createBlock(x, z, color, url, labelID) {
            var b = new THREE.Mesh(
                new THREE.BoxGeometry(4, 4, 4),
                new THREE.MeshBasicMaterial({ color: color })
            );
            b.position.set(x, 2, z);
            b.userData = { url: url, label: document.getElementById(labelID) };
            scene.add(b);
            blocks.push(b);
        }

        createBlock(-15, -10, 0xff3333, "https://imarihan3.github.io/RA-Bros-Jersey-Store/normaljerseys.html", "l1");
        createBlock(0, -20, 0x33ff33, "https://imarihan3.github.io/RA-Bros-Jersey-Store/lejerseys.html", "l2");
        createBlock(15, -10, 0x3333ff, "https://imarihan3.github.io/RA-Bros-Jersey-Store/customisablejerseys.html", "l3");

        // 7. CONTROLS
        var keys = {};
        window.onkeydown = function(e) { keys[e.key.toLowerCase()] = true; };
        window.onkeyup = function(e) { keys[e.key.toLowerCase()] = false; };

        var isDone = false;
        function animate() {
            requestAnimationFrame(animate);

            if(keys['w']) player.translateZ(-0.35);
            if(keys['s']) player.translateZ(0.35);
            if(keys['a']) player.rotation.y += 0.05;
            if(keys['d']) player.rotation.y -= 0.05;

            // Camera follow
            var camPos = new THREE.Vector3(0, 8, 16).applyQuaternion(player.quaternion).add(player.position);
            camera.position.lerp(camPos, 0.1);
            camera.lookAt(player.position);

            // Update Labels & Pure Math Collision
            blocks.forEach(function(b) {
                var vector = b.position.clone().project(camera);
                b.userData.label.style.left = (vector.x * .5 + .5) * window.innerWidth + 'px';
                b.userData.label.style.top = (vector.y * -.5 + .5) * window.innerHeight - 40 + 'px';

                // THE ULTIMATE FIX: Raw Math calculation. No 3D engine physics required.
                // We calculate exactly how far the player is from the center of the block on the floor.
                var distanceX = Math.abs(player.position.x - b.position.x);
                var distanceZ = Math.abs(player.position.z - b.position.z);
