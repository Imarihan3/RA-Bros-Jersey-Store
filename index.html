<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RA Bros 3D - Mobile Ready</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; cursor: pointer;
        }
        #ui {
            position: absolute; top: 10px; left: 10px; color: #fff;
            background: rgba(0, 40, 0, 0.8); padding: 15px;
            border: 2px solid #fff; border-radius: 10px; z-index: 100;
            pointer-events: none;
        }
        /* JOYSTICK STYLES */
        #joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px; background: rgba(255,255,255,0.2);
            border-radius: 50%; z-index: 1500; display: none; touch-action: none;
        }
        #joystick-knob {
            position: absolute; top: 30px; left: 30px;
            width: 60px; height: 60px; background: rgba(255,255,255,0.5);
            border-radius: 50%; touch-action: none;
        }
        .label {
            position: absolute; color: white; background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px; border-radius: 5px; border: 1px solid white;
            font-weight: bold; pointer-events: none; transform: translate(-50%, -100%);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="overlay" onclick="startApp()">
        <h1>RA BROS 3D STADIUM</h1>
        <p>TAP TO START & USE JOYSTICK</p>
    </div>

    <div id="ui">
        <h2 style="margin:0; color:#0f0;">JERSEY STADIUM</h2>
    </div>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <div id="l1" class="label" style="display:none">NORMAL JERSEYTS</div>
    <div id="l2" class="label" style="display:none">LIMITED JERSEYS</div>
    <div id="l3" class="label" style="display:none">CUSTOM JESRSEYS</div>

    <script>
        let joyPos = { x: 0, y: 0 };
        let isMoving = false;

        function startApp() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('joystick-container').style.display = 'block';
            init3D();
            setupJoystick();
        }

        // --- FIXED JOYSTICK LOGIC FOR ANDROID ---
        function setupJoystick() {
            const container = document.getElementById('joystick-container');
            const knob = document.getElementById('joystick-knob');
            
            // We get the rect dynamically to ensure coordinates stay accurate
            let rect = container.getBoundingClientRect();
            const centerX = 60; // 120 / 2
            const centerY = 60; // 120 / 2

            function handleMove(e) {
                if (!isMoving) return;
                
                // Block Android from scrolling while playing
                if (e.cancelable) e.preventDefault();

                // Handle both Touch and Mouse coordinates
                const clientX = e.touches ? e.touches.clientX : e.clientX;
                const clientY = e.touches ? e.touches.clientY : e.clientY;

                let x = clientX - rect.left - centerX;
                let y = clientY - rect.top - centerY;
                
                const distance = Math.min(Math.sqrt(x*x + y*y), 50);
                const angle = Math.atan2(y, x);
                
                x = Math.cos(angle) * distance;
                y = Math.sin(angle) * distance;

                knob.style.transform = `translate(${x}px, ${y}px)`;
                joyPos = { x: x / 50, y: y / 50 };
            }

            // TOUCH EVENTS (ANDROID/IOS)
            container.addEventListener('touchstart', (e) => {
                isMoving = true;
                rect = container.getBoundingClientRect(); // Update rect on touch
                handleMove(e);
            }, {passive: false});

            window.addEventListener('touchmove', handleMove, {passive: false});

            window.addEventListener('touchend', () => {
                isMoving = false;
                knob.style.transform = `translate(0px, 0px)`;
                joyPos = { x: 0, y: 0 };
            }, {passive: false});

            // MOUSE EVENTS (PC)
            container.addEventListener('mousedown', (e) => {
                isMoving = true;
                rect = container.getBoundingClientRect();
                handleMove(e);
            });
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', () => {
                isMoving = false;
                knob.style.transform = `translate(0px, 0px)`;
                joyPos = { x: 0, y: 0 };
            });
        }

        function init3D() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x2d5a27 }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const player = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({color: 0xffffff}));
            player.position.y = 1;
            scene.add(player);

            const blocks = [];
            function addStore(x, z, color, url, id) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(5, 5, 5), new THREE.MeshStandardMaterial({ color }));
                b.position.set(x, 2.5, z);
                b.userData = { url, label: document.getElementById(id) };
                b.userData.label.style.display = 'block';
                scene.add(b);
                blocks.push(b);
            }

            addStore(-20, -20, 0xff0000, "https://imarihan3.github.io/RA-Bros-Jersey-Store/normaljerseys.html", "l1");
            addStore(0, -35, 0x00ff00, "https://imarihan3.github.io/RA-Bros-Jersey-Store/lejerseys.html", "l2");
            addStore(20, -20, 0x0000ff, "https://imarihan3.github.io/RA-Bros-Jersey-Store/customisablejerseys.html", "l3");

            function animate() {
                requestAnimationFrame(animate);

                if (Math.abs(joyPos.y) > 0.1) player.translateZ(joyPos.y * 0.5);
                if (Math.abs(joyPos.x) > 0.1) player.rotation.y -= joyPos.x * 0.05;

                const idealPos = new THREE.Vector3(0, 8, 15).applyQuaternion(player.quaternion).add(player.position);
                camera.position.lerp(idealPos, 0.1);
                camera.lookAt(player.position);

                blocks.forEach(b => {
                    const vector = b.position.clone().project(camera);
                    b.userData.label.style.left = (vector.x * 0.5 + 0.5) * window.innerWidth + 'px';
                    b.userData.label.style.top = (vector.y * -0.5 + 0.5) * window.innerHeight - 40 + 'px';
                    if (player.position.distanceTo(b.position) < 4.5) window.location.href = b.userData.url;
                });

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
