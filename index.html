<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<!-- 🔒 CRITICAL: Prevent zoom / resize -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>RA Bros 3D - Stable</title>

<style>

/* 🔒 LOCK SCREEN COMPLETELY */
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  touch-action:none;
  overscroll-behavior:none;
  background:#87CEEB;
  font-family:sans-serif;
}

/* overlay */
#overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.85);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

/* joystick */
#joystick-container {
  position:absolute;
  bottom:40px;
  left:40px;
  width:120px;
  height:120px;
  background:rgba(255,255,255,0.15);
  border-radius:50%;
  display:none;
}

#joystick-knob {
  position:absolute;
  top:30px;
  left:30px;
  width:60px;
  height:60px;
  background:rgba(255,255,255,0.6);
  border-radius:50%;
}

/* button */
#enterBtn {
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  background:#ff0033;
  color:white;
  border:none;
  border-radius:10px;
  display:none;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<div id="overlay" onclick="startApp()">
  <h1>RA BROS 3D STADIUM</h1>
  <p>Tap to Start</p>
</div>

<button id="enterBtn">ENTER</button>

<div id="joystick-container">
  <div id="joystick-knob"></div>
</div>

<script>

/* 🔒 BLOCK ALL SCROLL + ZOOM */
document.addEventListener("touchmove", e => e.preventDefault(), { passive:false });
document.addEventListener("gesturestart", e => e.preventDefault());

let joyPos = {x:0,y:0};
let isMoving = false;

function startApp(){
  document.getElementById("overlay").style.display="none";
  document.getElementById("joystick-container").style.display="block";
  init3D();
  setupJoystick();
}

/* ================= JOYSTICK ================= */
function setupJoystick(){
  const container = document.getElementById("joystick-container");
  const knob = document.getElementById("joystick-knob");

  let rect;

  function getTouch(e){
    return e.touches ? e.touches[0] : e;
  }

  function move(e){
    if(!isMoving) return;
    if(e.cancelable) e.preventDefault();

    const t = getTouch(e);

    let x = t.clientX - rect.left - 60;
    let y = t.clientY - rect.top - 60;

    const dist = Math.min(Math.sqrt(x*x + y*y),50);
    const angle = Math.atan2(y,x);

    x = Math.cos(angle)*dist;
    y = Math.sin(angle)*dist;

    knob.style.transform = `translate(${x}px,${y}px)`;

    joyPos = {x:x/50, y:y/50};
  }

  container.addEventListener("touchstart", e=>{
    rect = container.getBoundingClientRect();
    isMoving=true;
    move(e);
  },{passive:false});

  window.addEventListener("touchmove", move,{passive:false});

  window.addEventListener("touchend", ()=>{
    isMoving=false;
    knob.style.transform="translate(0,0)";
    joyPos={x:0,y:0};
  });

  /* mouse support */
  container.addEventListener("mousedown", e=>{
    rect = container.getBoundingClientRect();
    isMoving=true;
    move(e);
  });

  window.addEventListener("mousemove", move);

  window.addEventListener("mouseup", ()=>{
    isMoving=false;
    knob.style.transform="translate(0,0)";
    joyPos={x:0,y:0};
  });
}

/* ================= 3D ================= */
function init3D(){

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

/* light */
scene.add(new THREE.AmbientLight(0xffffff,0.7));

/* floor */
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshBasicMaterial({color:0x2e8b57})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* player */
const player = new THREE.Mesh(
  new THREE.BoxGeometry(2,2,2),
  new THREE.MeshBasicMaterial({color:0xffffff})
);
player.position.y = 1;
scene.add(player);

/* smooth animation */
function animate(){
  requestAnimationFrame(animate);

  const speed = 0.4;

  /* smooth movement */
  player.position.x += joyPos.x * speed;
  player.position.z += joyPos.y * speed;

  /* ultra stable camera */
  const camTarget = new THREE.Vector3(
    player.position.x,
    player.position.y + 8,
    player.position.z + 15
  );

  camera.position.lerp(camTarget, 0.08); // smooth follow
  camera.lookAt(player.position);

  renderer.render(scene,camera);
}

animate();

/* resize */
window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

}

</script>

</body>
</html>
