<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RA Bros Jersey Store</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; background: #87CEEB; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            background: rgba(0, 40, 0, 0.85); padding: 20px;
            border: 3px solid #0f0; border-radius: 12px; z-index: 100;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: #0f0; font-size: 32px;
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0; color:#0f0;">RA BROS STADIUM</h2>
        <p>Use <b>W, S</b> to Move | <b>A, D</b> to Turn</p>
        <p>Walk into a color block to enter!</p>
    </div>

    <div id="loading-screen">TELEPORTING TO STORE...</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const loader = document.getElementById('loading-screen');

        // Resize handler
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 1. GAME WORLD DATA
        let player = { x: 5, y: 5, dir: 0, speed: 0, rotSpeed: 0 };
        
        // Map: 1=Red, 2=Green, 3=Blue, 0=Empty
        const world = [
           ,
           ,
           ,
           ,
           ,
           ,
           ,
           ,
           ,
           
        ];

        const urls = {
            1: "https://imarihan3.github.io/RA-Bros-Jersey-Store/normaljerseys.html",
            2: "https://imarihan3.github.io/RA-Bros-Jersey-Store/lejerseys.html",
            3: "https://imarihan3.github.io/RA-Bros-Jersey-Store/customisablejerseys.html"
        };

        const colors = { 1: "#ff3333", 2: "#33ff33", 3: "#3333ff" };
        const labels = { 1: "NORMAL", 2: "LIMITED", 3: "CUSTOM" };

        // 2. INPUT HANDLER
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        let isDone = false;

        function update() {
            if (isDone) return;

            // Rotation
            if (keys['a']) player.dir -= 0.05;
            if (keys['d']) player.dir += 0.05;

            // Movement
            let moveStep = 0;
            if (keys['w']) moveStep = 0.1;
            if (keys['s']) moveStep = -0.1;

            let newX = player.x + Math.cos(player.dir) * moveStep;
            let newY = player.y + Math.sin(player.dir) * moveStep;

            // Collision & Redirect
            let cell = world[Math.floor(newY)][Math.floor(newX)];
            if (cell > 0) {
                isDone = true;
                loader.style.display = "flex";
                window.location.href = urls[cell];
            } else {
                player.x = newX;
                player.y = newY;
            }
        }

        function draw() {
            // Draw Sky
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, canvas.height/2);

            // Draw Grass
            ctx.fillStyle = "#2d5a27";
            ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);

            // Raycasting Engine (Drawing the "3D" world)
            const numRays = 300;
            const fov = Math.PI / 3;
            
            for (let i = 0; i < numRays; i++) {
                let rayAngle = (player.dir - fov/2) + (i / numRays) * fov;
                let rayX = player.x;
                let rayY = player.y;
                let dX = Math.cos(rayAngle) * 0.02;
                let dY = Math.sin(rayAngle) * 0.02;

                let distance = 0;
                let hit = 0;
                
                while (hit == 0 && distance < 15) {
                    rayX += dX;
                    rayY += dY;
                    distance += 0.02;
                    if (world[Math.floor(rayY)][Math.floor(rayX)] > 0) {
                        hit = world[Math.floor(rayY)][Math.floor(rayX)];
                    }
                }

                // Fix fish-eye effect
                distance = distance * Math.cos(rayAngle - player.dir);
                let wallHeight = canvas.height / distance;

                // Draw Wall slice
                ctx.fillStyle = colors[hit] || "#000";
                // Darken distant walls
                ctx.globalAlpha = Math.max(0, 1 - distance/10);
                ctx.fillRect(i * (canvas.width/numRays), (canvas.height - wallHeight)/2, (canvas.width/numRays) + 1, wallHeight);
                ctx.globalAlpha = 1.0;
            }
            
            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
