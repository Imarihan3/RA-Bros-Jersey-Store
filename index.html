<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RA Bros 3D Stadium</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; cursor: pointer;
        }
        #ui {
            position: absolute; top: 10px; left: 10px; color: #fff;
            background: rgba(0, 40, 0, 0.8); padding: 15px;
            border: 2px solid #fff; border-radius: 10px; z-index: 100;
            pointer-events: none; display: none;
        }
        .label {
            position: absolute; color: white; background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px; border-radius: 5px; border: 1px solid white;
            font-weight: bold; pointer-events: none; transform: translate(-50%, -100%);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="overlay" onclick="startApp()">
        <h1>RA BROS 3D STADIUM</h1>
        <p>Click anywhere to Enter Field</p>
    </div>

    <div id="ui">
        <h2 style="margin:0; color:#0f0;">JERSEY STADIUM</h2>
        <p>Move: <b>W, A, S, D</b></p>
    </div>

    <div id="l1" class="label" style="display:none">NORMAL JERSEYS</div>
    <div id="l2" class="label" style="display:none">LIMITED EDITION</div>
    <div id="l3" class="label" style="display:none">CUSTOMISABLE</div>

    <script>
        function startApp() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            init3D();
        }

        function init3D() {
            // 1. SCENE SETUP
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.Fog(0x87CEEB, 20, 150);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. LIGHTING
            const light = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(light);
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(50, 50, 50);
            scene.add(sun);

            // 3. THE PITCH
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(150, 150),
                new THREE.MeshStandardMaterial({ color: 0x2d5a27 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const grid = new THREE.GridHelper(150, 30, 0xffffff, 0x447744);
            grid.position.y = 0.05;
            scene.add(grid);

            // 4. GOALS
            function createGoal(zPos) {
                const mat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const group = new THREE.Group();
                const p1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 10, 0.5), mat);
                p1.position.set(-10, 5, 0);
                const p2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 10, 0.5), mat);
                p2.position.set(10, 5, 0);
                const bar = new THREE.Mesh(new THREE.BoxGeometry(20, 0.5, 0.5), mat);
                bar.position.set(0, 10, 0);
                group.add(p1, p2, bar);
                group.position.z = zPos;
                scene.add(group);
            }
            createGoal(-70); createGoal(70);

            // 5. PLAYER (The Football Cube)
            const mats = [
                new THREE.MeshStandardMaterial({color: 0x000000}),
                new THREE.MeshStandardMaterial({color: 0xffffff}),
                new THREE.MeshStandardMaterial({color: 0xffffff}),
                new THREE.MeshStandardMaterial({color: 0x000000}),
                new THREE.MeshStandardMaterial({color: 0x000000}),
                new THREE.MeshStandardMaterial({color: 0xffffff})
            ];
            const player = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), mats);
            player.position.y = 1;
            scene.add(player);

            // 6. STORE BLOCKS
            const blocks = [];
            function addStore(x, z, color, url, labelId) {
                const b = new THREE.Mesh(
                    new THREE.BoxGeometry(6, 6, 6),
                    new THREE.MeshStandardMaterial({ color: color })
                );
                b.position.set(x, 3, z);
                b.userData = { url: url, label: document.getElementById(labelId) };
                b.userData.label.style.display = 'block';
                scene.add(b);
                blocks.push(b);
            }

            addStore(-25, -20, 0xff3333, "https://imarihan3.github.io/RA-Bros-Jersey-Store/normaljerseys.html", "l1");
            addStore(0, -40, 0x33ff33, "https://imarihan3.github.io/RA-Bros-Jersey-Store/lejerseys.html", "l2");
            addStore(25, -20, 0x3333ff, "https://imarihan3.github.io/RA-Bros-Jersey-Store/customisablejerseys.html", "l3");

            // 7. CONTROLS
            const keys = {};
            window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

            let redirected = false;

            function animate() {
                requestAnimationFrame(animate);

                if (keys['w']) player.translateZ(-0.5);
                if (keys['s']) player.translateZ(0.5);
                if (keys['a']) player.rotation.y += 0.05;
                if (keys['d']) player.rotation.y -= 0.05;

                // Smooth Camera
                const idealPos = new THREE.Vector3(0, 10, 20).applyQuaternion(player.quaternion).add(player.position);
                camera.position.lerp(idealPos, 0.1);
                camera.lookAt(player.position);

                // Update Labels & Math Collision
                blocks.forEach(b => {
                    const vector = b.position.clone().project(camera);
                    b.userData.label.style.left = (vector.x * 0.5 + 0.5) * window.innerWidth + 'px';
                    b.userData.label.style.top = (vector.y * -0.5 + 0.5) * window.innerHeight - 50 + 'px';

                    // Collision Check
                    const dist = player.position.distanceTo(b.position);
                    if (!redirected && dist < 5) {
                        redirected = true;
                        window.location.href = b.userData.url;
                    }
                });

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
